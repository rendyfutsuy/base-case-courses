definitions:
  dto.ReferenceObject:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.ReqAuthUser:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  dto.ReqCheckDuplicatedEmail:
    properties:
      email:
        type: string
      excluded_user_id:
        type: string
    required:
    - email
    type: object
  dto.ReqCheckDuplicatedRole:
    properties:
      excluded_role_info_id:
        type: string
      role_name:
        type: string
    required:
    - role_name
    type: object
  dto.ReqCheckDuplicatedUser:
    properties:
      excluded_user_id:
        type: string
      username:
        type: string
    required:
    - username
    type: object
  dto.ReqConfirmationUserPassword:
    properties:
      password:
        type: string
    required:
    - password
    type: object
  dto.ReqCreateCourse:
    properties:
      description:
        type: string
      discount_rate:
        type: number
      lang_id:
        type: string
      level_id:
        type: string
      price:
        type: number
      short_description:
        maxLength: 255
        type: string
      thumbnailURL:
        description: mutate from thumbnail file
        type: string
      title:
        maxLength: 255
        type: string
      topic_ids:
        items:
          type: string
        type: array
    required:
    - description
    - discount_rate
    - price
    - short_description
    - title
    type: object
  dto.ReqCreateParameter:
    properties:
      code:
        maxLength: 255
        type: string
      desc:
        type: string
      name:
        maxLength: 255
        type: string
      parent_id:
        type: string
      type:
        type: string
      value:
        type: string
    required:
    - code
    - name
    type: object
  dto.ReqCreateRole:
    properties:
      accesses:
        items:
          type: string
        minItems: 1
        type: array
      description:
        type: string
      role_name:
        maxLength: 80
        type: string
    required:
    - accesses
    - role_name
    type: object
  dto.ReqCreateUser:
    properties:
      email:
        type: string
      name:
        maxLength: 80
        type: string
      nik:
        type: string
      password:
        minLength: 8
        type: string
      password_confirmation:
        type: string
      role_id:
        type: string
      username:
        type: string
    required:
    - email
    - name
    - nik
    - password
    - password_confirmation
    - role_id
    - username
    type: object
  dto.ReqRegisterUser:
    properties:
      email:
        type: string
      name:
        maxLength: 80
        type: string
      nik:
        type: string
      password:
        minLength: 8
        type: string
      password_confirmation:
        type: string
      username:
        type: string
    required:
    - email
    - name
    - nik
    - password
    - password_confirmation
    - username
    type: object
  dto.ReqResetPassword:
    properties:
      password:
        maxLength: 25
        minLength: 8
        type: string
      password_confirmation:
        type: string
    required:
    - password
    - password_confirmation
    type: object
  dto.ReqResetPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.ReqUpdateCourse:
    properties:
      description:
        type: string
      discount_rate:
        type: number
      lang_id:
        type: string
      level_id:
        type: string
      price:
        type: number
      remove_thumbnail:
        default: false
        type: boolean
      short_description:
        maxLength: 255
        type: string
      thumbnailURL:
        description: mutate from thumbnail file
        type: string
      title:
        maxLength: 255
        type: string
      topic_ids:
        items:
          type: string
        type: array
    required:
    - description
    - discount_rate
    - price
    - short_description
    - title
    type: object
  dto.ReqUpdateParameter:
    properties:
      code:
        maxLength: 255
        type: string
      desc:
        type: string
      name:
        maxLength: 255
        type: string
      parent_id:
        type: string
      type:
        type: string
      value:
        type: string
    required:
    - code
    - name
    type: object
  dto.ReqUpdatePassword:
    properties:
      new_password:
        type: string
      password_confirmation:
        type: string
    required:
    - new_password
    - password_confirmation
    type: object
  dto.ReqUpdateProfile:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.ReqUpdateRole:
    properties:
      accesses:
        items:
          type: string
        minItems: 1
        type: array
      description:
        type: string
      role_name:
        maxLength: 80
        type: string
    required:
    - accesses
    - role_name
    type: object
  dto.ReqUpdateUser:
    properties:
      email:
        type: string
      gender:
        type: string
      is_active:
        type: boolean
      name:
        maxLength: 80
        type: string
      password:
        type: string
      password_confirmation:
        type: string
      role_id:
        type: string
      username:
        type: string
    required:
    - email
    - name
    - role_id
    - username
    type: object
  dto.ReqUpdateUserPassword:
    properties:
      new_password:
        type: string
      password_confirmation:
        type: string
    required:
    - new_password
    - password_confirmation
    type: object
  dto.ResImportUserExcel:
    properties:
      error_message:
        description: Message error jika status failed
        type: string
      row:
        description: Nomor baris di Excel
        type: integer
      status:
        description: 'Status row: "success" atau "failed"'
        type: string
      username:
        description: Username user
        type: string
    type: object
  dto.ResImportUsers:
    properties:
      failed_count:
        type: integer
      results:
        items:
          $ref: '#/definitions/dto.ResImportUserExcel'
        type: array
      success_count:
        type: integer
      total_rows:
        type: integer
    type: object
  dto.RespCourse:
    properties:
      created_at:
        type: string
      description:
        type: string
      discount_rate:
        type: number
      discounted_price:
        type: number
      id:
        type: string
      lang:
        $ref: '#/definitions/dto.ReferenceObject'
      level:
        $ref: '#/definitions/dto.ReferenceObject'
      price:
        type: number
      short_description:
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
      topics:
        items:
          $ref: '#/definitions/dto.ReferenceObject'
        type: array
      updated_at:
        type: string
    type: object
  dto.RespCourseIndex:
    properties:
      created_at:
        type: string
      discount_rate:
        type: number
      discounted_price:
        type: number
      id:
        type: string
      price:
        type: number
      short_description:
        type: string
      thumbnail_url:
        type: string
      title:
        type: string
    type: object
  dto.RespParameter:
    properties:
      code:
        type: string
      created_at:
        type: string
      deletable:
        type: boolean
      desc:
        type: string
      id:
        type: string
      name:
        type: string
      parent:
        $ref: '#/definitions/dto.RespParameterParent'
      type:
        type: string
      updated_at:
        type: string
      value:
        type: string
    type: object
  dto.RespParameterIndex:
    properties:
      code:
        type: string
      created_at:
        type: string
      deletable:
        type: boolean
      id:
        type: string
      name:
        type: string
      type:
        type: string
      updated_at:
        type: string
      value:
        type: string
    type: object
  dto.RespParameterParent:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.RespPermissionGroup:
    properties:
      id:
        type: string
      name:
        type: string
      value:
        type: boolean
    type: object
  dto.RespPermissionGroupByModule:
    properties:
      accesses:
        items:
          $ref: '#/definitions/dto.RespPermissionGroup'
        type: array
      name:
        type: string
    type: object
  dto.RespRole:
    properties:
      id:
        type: string
      role_name:
        type: string
    type: object
  dto.RespRoleDetail:
    properties:
      created_at:
        type: string
      deletable:
        type: boolean
      description:
        type: string
      id:
        type: string
      modules:
        items:
          $ref: '#/definitions/dto.RespPermissionGroupByModule'
        type: array
      role_name:
        type: string
      total_user:
        type: integer
      updated_at:
        $ref: '#/definitions/utils.NullTime'
    type: object
  dto.RespRoleIndex:
    properties:
      created_at:
        type: string
      deletable:
        type: boolean
      id:
        type: string
      modules:
        items:
          type: string
        type: array
      role_name:
        type: string
      total_user:
        type: integer
      updated_at:
        $ref: '#/definitions/utils.NullTime'
    type: object
  dto.RespUser:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.RespUserDetail:
    properties:
      created_at:
        type: string
      deletable:
        type: boolean
      email:
        type: string
      id:
        type: string
      name:
        type: string
      nik:
        type: string
      role_id:
        type: string
      role_name:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  dto.RespUserIndex:
    properties:
      created_at:
        type: string
      deletable:
        type: boolean
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role_name:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  dto.UserProfile:
    properties:
      avatar:
        type: string
      email:
        type: string
      id:
        type: string
      is_first_time_login:
        type: boolean
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
      username:
        type: string
      verified_at:
        type: string
    type: object
  http.GeneralResponse:
    properties:
      message:
        type: string
    type: object
  http.ResponseAuth:
    properties:
      access_token:
        type: string
      is_first_time_login:
        type: boolean
      refresh_token:
        type: string
    type: object
  response.NonPaginationResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: integer
    type: object
  response.PaginationMeta:
    properties:
      current_page:
        type: integer
      from:
        type: integer
      last_page:
        type: integer
      per_page:
        type: integer
      to:
        type: integer
      total:
        type: integer
    type: object
  response.PaginationResponse:
    properties:
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/response.PaginationMeta'
      status:
        type: integer
    type: object
  utils.NullTime:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
info:
  contact: {}
  description: Welcome to the API documentation for the Base Template Web Application.
    This comprehensive guide is designed to help developers seamlessly integrate and
    interact with our platform's functionalities. Whether you're building new features,
    enhancing existing ones, or troubleshooting, this documentation provides all the
    necessary resources and information.
  title: Base Template API Documentation
  version: 0.0-beta
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an access token and is_first_time_login
        status
      parameters:
      - description: User login and password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ReqAuthUser'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully authenticated
          schema:
            allOf:
            - $ref: '#/definitions/response.NonPaginationResponse'
            - properties:
                data:
                  $ref: '#/definitions/http.ResponseAuth'
              type: object
        "401":
          description: Unauthorized - invalid credentials or user not found
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      summary: Authenticate user
      tags:
      - Authentication
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Logs out the user by invalidating the session token
      produces:
      - application/json
      responses:
        "200":
          description: Successfully logged out
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Sign out user
      tags:
      - Authentication
  /v1/auth/profile:
    get:
      consumes:
      - application/json
      description: Retrieves the profile of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: User profile data
          schema:
            allOf:
            - $ref: '#/definitions/response.NonPaginationResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserProfile'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - Authentication
    put:
      consumes:
      - application/json
      description: Updates the profile information of the authenticated user
      parameters:
      - description: Updated user profile data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ReqUpdateProfile'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated profile
          schema:
            $ref: '#/definitions/http.GeneralResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/http.GeneralResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.GeneralResponse'
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Authentication
  /v1/auth/profile/my-password:
    put:
      consumes:
      - application/json
      description: Updates the password of the authenticated user
      parameters:
      - description: New password data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ReqUpdatePassword'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated password
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Update user password
      tags:
      - Authentication
  /v1/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Generates a new access token based on the provided bearer token.
        Access tokens that have expired can still be refreshed as long as the Redis
        session (TTL) has not expired. If the token is revoked or the Redis session
        has expired, returns an error.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully refreshed token
          schema:
            allOf:
            - $ref: '#/definitions/response.NonPaginationResponse'
            - properties:
                data:
                  $ref: '#/definitions/http.ResponseAuth'
              type: object
        "401":
          description: Unauthorized - token is revoked, invalid, or Redis session
            expired
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Refresh access token
      tags:
      - Authentication
  /v1/auth/reset-password/request:
    post:
      consumes:
      - application/json
      description: Sends a password reset email to the provided email address
      parameters:
      - description: Reset Password Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ReqResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully Send Reset Email Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      summary: Request a password reset email
      tags:
      - Authentication
  /v1/auth/reset-password/request/{token}:
    post:
      consumes:
      - application/json
      description: Resets the user password using a valid token
      parameters:
      - description: Password Reset Token
        in: path
        name: token
        required: true
        type: string
      - description: Reset User Password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ReqResetPassword'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully Reset Password
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      summary: Reset user password
      tags:
      - Authentication
  /v1/course:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of courses with optional filtering
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Sort column
        in: query
        name: sort_by
        type: string
      - description: Sort order (asc/desc)
        in: query
        name: sort_order
        type: string
      - description: Search query
        in: query
        name: search
        type: string
      - collectionFormat: csv
        in: query
        items:
          type: string
        name: lang_ids
        type: array
      - collectionFormat: csv
        in: query
        items:
          type: string
        name: level_ids
        type: array
      - in: query
        name: search
        type: string
      - in: query
        name: sort_by
        type: string
      - in: query
        name: sort_order
        type: string
      - collectionFormat: csv
        in: query
        items:
          type: string
        name: topic_ids
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.PaginationResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.RespCourseIndex'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      summary: Get paginated list of courses
      tags:
      - Course
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Create a course with optional thumbnail upload
      parameters:
      - description: Course payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ReqCreateCourse'
      - description: Thumbnail file
        in: formData
        name: thumbnail
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.NonPaginationResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.RespCourse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Create course
      tags:
      - Course
  /v1/course/{id}:
    delete:
      description: Delete a course by ID
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Delete course
      tags:
      - Course
    get:
      description: Retrieve course detail and its parameters
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.NonPaginationResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.RespCourse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      summary: Get course by ID
      tags:
      - Course
    put:
      consumes:
      - application/json
      - multipart/form-data
      description: Update a course with optional thumbnail upload
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: string
      - description: Course payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.ReqUpdateCourse'
      - description: Thumbnail file
        in: formData
        name: thumbnail
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.NonPaginationResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.RespCourse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Update course
      tags:
      - Course
  /v1/parameter:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of parameters with optional filters
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Search keyword
        in: query
        name: search
        type: string
      - collectionFormat: csv
        description: Filter by parameter types (array)
        in: query
        items:
          type: string
        name: types
        type: array
      - collectionFormat: csv
        description: Filter by parameter names (array)
        in: query
        items:
          type: string
        name: names
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved parameters
          schema:
            allOf:
            - $ref: '#/definitions/response.PaginationResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.RespParameterIndex'
                  type: array
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.NonPaginationResponse'
      security:
      - BearerAuth: []
      summary: Get list of parameters with pagination
      tags:
      - Parameter
    post:
      consumes:
      - application/json
      description: Create a new parameter with provided code, name, value, and description
      parameters:
      - description: Parameter creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ReqCreateParameter'
      produces:
      - application/json
